  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --dark:#2C1A0E; --brown:#6B4226; --gold:#bfb18d;
      --cream:#F5F0E8; --light:#FAFAF7;
      --sk:#4a3728; --sk2:#7a5f4a; --sk3:#bfb18d;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: var(--light); }

    /* ── ANIMATIONS ────────────────────────────────── */
    @keyframes drawStroke { to { stroke-dashoffset: 0; } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes slideL   { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideR   { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
    @keyframes float    { 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-7px) rotate(.8deg); } }
    @keyframes spin     { to { transform:rotate(360deg); } }
    @keyframes popIn    { 0%{ transform:scale(.85); opacity:0; } 60%{ transform:scale(1.05); } 100%{ transform:scale(1); opacity:1; } }
    @keyframes progress { from { width:0; } to { width:100%; } }

    /* draw-path helpers */
    .dp  { stroke-dasharray:2400; stroke-dashoffset:2400; animation:drawStroke 1.1s ease forwards; animation-delay:var(--d,0s); }
    .dp2 { stroke-dasharray:1000; stroke-dashoffset:1000; animation:drawStroke 0.7s ease forwards; animation-delay:var(--d,0s); }
    .dp3 { stroke-dasharray:400;  stroke-dashoffset:400;  animation:drawStroke 0.45s ease forwards; animation-delay:var(--d,0s); }

    /* sketch stroke defaults */
    .sm  { stroke:var(--sk);  stroke-width:1.4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .sd  { stroke:var(--sk);  stroke-width:0.9; fill:none; stroke-linecap:round; }
    .sl  { stroke:var(--sk2); stroke-width:0.7; fill:none; stroke-linecap:round; stroke-dasharray:5 4; }
    .sh  { stroke:var(--sk);  stroke-width:0.6; fill:none; opacity:.35; }
    .sa  { stroke:var(--sk3); stroke-width:0.8; fill:none; stroke-linecap:round; }

    /* step transitions */
    .step-enter { animation: fadeUp .35s ease forwards; }
    .step-enter-l { animation: slideL .35s ease forwards; }
    .step-enter-r { animation: slideR .35s ease forwards; }
    .card-pop  { animation: popIn .3s ease forwards; animation-delay: var(--d,0s); opacity:0; }

    /* background grid */
    .dot-grid {
      background-image: radial-gradient(circle, rgba(191,177,141,.22) 1px, transparent 1px);
      background-size: 26px 26px;
    }

    /* floating bg elements */
    .bg-float { animation: float var(--dur,6s) ease-in-out infinite; animation-delay: var(--fd,0s); }

    /* inputs */
    .t-input {
      width:100%; border:1.5px solid rgba(191,177,141,.4); background:#fff;
      padding:11px 15px; font-family:'Inter',sans-serif; font-size:14px;
      color:var(--dark); outline:none; transition:border-color .2s;
    }
    .t-input:focus { border-color:var(--brown); }
    .t-input::placeholder { color:rgba(44,26,14,.3); }
    textarea.t-input { resize:none; }

    /* cards */
    .fcard {
      cursor:pointer; border:1.5px solid rgba(191,177,141,.35);
      background:#fff; transition:all .2s cubic-bezier(.4,0,.2,1);
      padding:18px 12px 14px;
    }
    .fcard:hover { transform:translateY(-2px); border-color:rgba(107,66,38,.35); background:var(--cream); }
    .fcard.sel   { border-color:var(--brown) !important; background:var(--cream) !important;
                   box-shadow:0 0 0 3px rgba(107,66,38,.1); }

    .mcard {
      cursor:pointer; border:1.5px solid rgba(191,177,141,.35);
      background:#fff; padding:14px 16px; transition:all .2s;
    }
    .mcard:hover { border-color:rgba(107,66,38,.4); background:var(--cream); }
    .mcard.sel   { border-color:var(--brown); background:var(--cream); }

    .ccard {
      cursor:pointer; border:2px solid transparent; padding:10px 6px;
      transition:all .2s; text-align:center;
    }
    .ccard:hover { border-color:rgba(44,26,14,.12); background:rgba(245,240,232,.5); }
    .ccard.sel   { border-color:var(--brown); background:var(--cream); }

    /* progress bar */
    .prog-track { background:rgba(191,177,141,.2); height:2px; }
    .prog-fill  { height:2px; background:var(--gold); transition:width .5s cubic-bezier(.4,0,.2,1); }

    /* qty */
    .qty-btn {
      width:38px; height:38px; border:1.5px solid rgba(191,177,141,.4);
      background:#fff; cursor:pointer; font-size:18px; color:var(--dark);
      display:flex; align-items:center; justify-content:center;
      transition:border-color .2s;
    }
    .qty-btn:hover { border-color:var(--brown); }

    /* scroll */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--gold); border-radius:2px; }

    /* sketch panel */
    .sketch-panel {
      background:rgba(245,240,232,.5); border:1px solid rgba(191,177,141,.25);
      border-radius:2px; padding:32px; min-height:360px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }
    .sketch-panel-bg {
      position:absolute; inset:0; pointer-events:none; opacity:.07;
    }

    /* loading */
    #loading { position:fixed; inset:0; background:var(--light); display:flex; align-items:center; justify-content:center; z-index:999; transition:opacity .4s; }
    #loading.out { opacity:0; pointer-events:none; }

    /* WA button */
    .wa-btn { position:fixed; bottom:24px; right:24px; z-index:50;
      background:#22c55e; color:#fff; width:56px; height:56px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 20px rgba(34,197,94,.35); transition:all .3s; }
    .wa-btn:hover { background:#16a34a; transform:scale(1.1); }
  </style>
</head>

    /* ════════════════════════════════════════════════════════

    ════════════════════════════════════════════════════════ */
    function Icon({ name, size = 20, strokeWidth = 1.6, color = 'currentColor', className = '' }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current || !window.lucide) return;
        const iconFn = window.lucide[name];
        if (!iconFn) return;
        const el = window.lucide.createElement(iconFn, { size, color, 'stroke-width': strokeWidth });
        ref.current.innerHTML = '';
        ref.current.appendChild(el);
      }, [name, size, strokeWidth, color]);
      return <span ref={ref} className={`inline-flex items-center ${className}`} aria-hidden="true" />;
    }

    /* ════════════════════════════════════════════════════════
       NAVBAR
    ════════════════════════════════════════════════════════ */
    function Navbar() {
      const ref = useRef(null);
      useEffect(() => {
        const nav = ref.current;
        function upd() {
          const s = window.scrollY > 50;
          nav.style.background = 'rgba(250,250,247,.98)';
          nav.style.backdropFilter = 'blur(8px)';
          nav.style.boxShadow = s ? '0 1px 0 rgba(191,177,141,.2)' : 'none';
          nav.style.paddingTop = s ? '.6rem' : '1.1rem';
          nav.style.paddingBottom = s ? '.6rem' : '1.1rem';
        }
        window.addEventListener('scroll', upd, { passive:true });
        upd();
        return () => window.removeEventListener('scroll', upd);
      }, []);
      return (
        <nav ref={ref} style={{position:'fixed',top:0,left:0,right:0,zIndex:40,transition:'all .4s'}}>
          <div style={{maxWidth:'1280px',margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <a href="/" style={{display:'block',transition:'opacity .3s'}}>
              <img src="/media/logo-teca.webp" alt="TECA Muebles" style={{height:'44px',width:'auto'}}/>
            </a>
            <div style={{display:'flex',alignItems:'center',gap:'28px'}}>
              {['/#proceso','/#taller','/#nosotros','/#colores','/#contacto'].map((href,i)=>(
                <a key={i} href={href} style={{fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.2em',textTransform:'uppercase',color:'rgba(44,26,14,.5)',textDecoration:'none',transition:'color .2s'}}
                   onMouseEnter={e=>e.target.style.color='#2C1A0E'}
                   onMouseLeave={e=>e.target.style.color='rgba(44,26,14,.5)'}>
                  {href.replace('/#','')}
                </a>
              ))}
              <a href="/cotiza" style={{fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.2em',textTransform:'uppercase',background:'#2C1A0E',color:'#F5F0E8',padding:'9px 18px',textDecoration:'none',transition:'background .2s'}}
                 onMouseEnter={e=>e.target.style.background='#6B4226'}
                 onMouseLeave={e=>e.target.style.background='#2C1A0E'}>
                Cotizá
              </a>
            </div>
          </div>
        </nav>
      );
    }

    /* ════════════════════════════════════════════════════════
       PROGRESS BAR
    ════════════════════════════════════════════════════════ */
    function ProgressBar({ step }) {
      const pct = ((step - 1) / 3) * 100;
      const steps = ['Mueble','Medidas','Terminación','Tus datos'];
      return (
        <div style={{background:'rgba(250,250,247,.96)',backdropFilter:'blur(8px)',borderBottom:'1px solid rgba(191,177,141,.2)',padding:'14px 0',position:'sticky',top:'68px',zIndex:30}}>
          <div style={{maxWidth:'960px',margin:'0 auto',padding:'0 24px'}}>
            <div className="prog-track" style={{marginBottom:'12px'}}>
              <div className="prog-fill" style={{width:`${pct}%`}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              {steps.map((s,i)=>{
                const done = i+1 < step, active = i+1 === step;
                return (
                  <div key={i} style={{display:'flex',alignItems:'center',gap:'6px'}}>
                    <span style={{
                      width:'22px',height:'22px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:'10px',fontFamily:'Inter,sans-serif',fontWeight:'500',
                      background: done ? 'var(--gold)' : active ? 'var(--dark)' : 'rgba(191,177,141,.2)',
                      color: done ? 'var(--dark)' : active ? 'var(--cream)' : 'rgba(44,26,14,.3)',
                      transition:'all .4s'
                    }}>
                      {done ? '✓' : i+1}
                    </span>
                    <span style={{fontFamily:'Inter,sans-serif',fontSize:'10px',letterSpacing:'.15em',textTransform:'uppercase',
                      color: active ? 'var(--dark)' : done ? 'var(--brown)' : 'rgba(44,26,14,.3)',
                      display: 'none'}} className="sm:block">{s}</span>
                    <span style={{fontFamily:'Inter,sans-serif',fontSize:'10px',letterSpacing:'.15em',textTransform:'uppercase',
                      color: active ? 'var(--dark)' : done ? 'var(--brown)' : 'rgba(44,26,14,.3)',
                      display:'block'}} className="hidden sm:block">{s}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

                  <Icon name={m.icon} size={28} strokeWidth={1.4} color={selected.has(m.id) ? '#6B4226' : 'rgba(44,26,14,.55)'}/>
                </div>
                <div style={{fontFamily:'Inter,sans-serif',fontSize:'12px',fontWeight:selected.has(m.id)?'500':'400',color:selected.has(m.id)?'var(--dark)':'rgba(44,26,14,.65)',marginBottom:'3px',textAlign:'center'}}>{m.label}</div>
                <div style={{fontFamily:'Inter,sans-serif',fontSize:'10px',color:'rgba(44,26,14,.35)',textAlign:'center'}}>{m.desc}</div>
                {selected.has(m.id) && (
                  <span style={{position:'absolute',top:'8px',right:'8px',width:'16px',height:'16px',background:'var(--brown)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:'9px'}}>✓</span>
                )}
              </button>
            ))}
          </div>

          {selected.has('otro') && (
            <div style={{marginBottom:'24px',animation:'fadeIn .3s ease'}}>
              <label style={{display:'block',fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.15em',textTransform:'uppercase',color:'rgba(44,26,14,.5)',marginBottom:'8px'}}>¿Qué mueble tenés en mente?</label>
              <input className="t-input" value={otroText} onChange={e=>setOtroText(e.target.value)} placeholder="Ej: mesa ratona, cabecera, banco..."/>
            </div>
          )}

          <div style={{display:'flex',justifyContent:'flex-end'}}>
            <button onClick={onNext} disabled={selected.size===0}
              style={{display:'flex',alignItems:'center',gap:'8px',background:'var(--dark)',color:'var(--cream)',fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.2em',textTransform:'uppercase',padding:'14px 28px',border:'none',cursor:selected.size>0?'pointer':'not-allowed',opacity:selected.size>0?1:.4,transition:'all .2s'}}
              onMouseEnter={e=>{if(selected.size>0)e.currentTarget.style.background='var(--brown)'}}
              onMouseLeave={e=>e.currentTarget.style.background='var(--dark)'}>
              Siguiente <Icon name="ChevronRight" size={16} strokeWidth={2} color="currentColor"/>
            </button>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════════════════
       STEP 2 — MEDIDAS
    ════════════════════════════════════════════════════════ */
    function StepMedidas({ qty, onQtyChange, medidas, onMedidas, onNext, onBack }) {
      return (
        <div className="step-enter">
          <p style={{fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.4em',textTransform:'uppercase',color:'var(--gold)',marginBottom:'8px'}}>Paso 2</p>
          <h2 style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(1.6rem,4vw,2.2rem)',color:'var(--dark)',marginBottom:'6px'}}>Medidas aproximadas</h2>
          <p style={{fontFamily:'Inter,sans-serif',fontSize:'14px',color:'rgba(44,26,14,.5)',marginBottom:'32px'}}>Si no las tenés exactas, poné una estimación. Lo ajustamos en la consulta.</p>

          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'16px',marginBottom:'28px'}}>
            {[['Ancho (cm)','ancho','ej: 120'],['Alto (cm)','alto','ej: 200'],['Profundidad (cm)','prof','ej: 40']].map(([label,key,ph])=>(
              <div key={key}>

            <label style={{display:'block',fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.15em',textTransform:'uppercase',color:'rgba(44,26,14,.5)',marginBottom:'12px'}}>Cantidad</label>
            <div style={{display:'flex',alignItems:'center',gap:'14px'}}>
              <button className="qty-btn" onClick={()=>onQtyChange(Math.max(1,qty-1))}>−</button>
              <span style={{fontFamily:'Playfair Display,serif',fontSize:'26px',color:'var(--dark)',minWidth:'32px',textAlign:'center'}}>{qty}</span>
              <button className="qty-btn" onClick={()=>onQtyChange(Math.min(20,qty+1))}>+</button>
              <span style={{fontFamily:'Inter,sans-serif',fontSize:'12px',color:'rgba(44,26,14,.4)'}}>unidad{qty>1?'es':''}</span>
            </div>
          </div>

          <div style={{marginBottom:'32px'}}>
            <label style={{display:'block',fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.15em',textTransform:'uppercase',color:'rgba(44,26,14,.5)',marginBottom:'12px'}}>¿Tenés referencia o inspiración?</label>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              {['Sí, tengo fotos o planos','No, lo describimos juntos'].map((opt,i)=>(
                <label key={i} style={{display:'flex',alignItems:'center',gap:'10px',border:'1.5px solid rgba(191,177,141,.4)',padding:'12px 14px',cursor:'pointer',background:'#fff',transition:'all .2s'}}>

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

              onMouseEnter={e=>e.currentTarget.style.color='var(--dark)'}
              onMouseLeave={e=>e.currentTarget.style.color='rgba(44,26,14,.4)'}>
              <Icon name="ChevronLeft" size={16} strokeWidth={2}/> Atrás

            <button onClick={onNext}

              onMouseEnter={e=>e.currentTarget.style.background='var(--brown)'}

        </div>
      );
    }

    /* ════════════════════════════════════════════════════════

              onMouseEnter={e=>e.currentTarget.style.color='var(--dark)'}

      );

    ════════════════════════════════════════════════════════ */
    function StepContacto({ contacto, onChange, selectedMuebles, qty, material, herrajes, terminacion, onBack }) {
      const ready = contacto.nombre.trim() && contacto.wsp.trim();

      function sendWhatsApp() {
        const mueblesStr = [...selectedMuebles].map(id => MUEBLES.find(m=>m.id===id)?.label||id).join(', ');
        const matStr  = MATERIALES.find(m=>m.id===material)?.label || '—';
        const herrStr = HERRAJES.find(h=>h.id===herrajes)?.label   || '—';
        const termStr = COLORES.find(c=>c.id===terminacion)?.label || '—';
        const msg = [
          `Hola TECA Muebles! 👋 Quiero cotizar un proyecto.`,``,
          `*Proyecto:*`,
          `• Mueble: ${mueblesStr}`,
          `• Cantidad: ${qty} unidad${qty>1?'es':''}`,
          `• Material: ${matStr}`,
          `• Herrajes: ${herrStr}`,
          `• Terminación: ${termStr}`,
          contacto.desc ? `• Descripción: ${contacto.desc}` : null,``,
          `*Mis datos:*`,
          `• Nombre: ${contacto.nombre}`,
          `• WhatsApp: ${contacto.wsp}`,
          contacto.email ? `• Email: ${contacto.email}` : null,

              <label style={{display:'block',fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.15em',textTransform:'uppercase',color:'rgba(44,26,14,.5)',marginBottom:'8px'}}>Nombre *</label>

              <input className="t-input" type="tel" placeholder="221 555-1234" value={contacto.wsp} onChange={e=>onChange({...contacto,wsp:e.target.value})}/>

            <label style={{display:'block',fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.15em',textTransform:'uppercase',color:'rgba(44,26,14,.5)',marginBottom:'8px'}}>Email <span style={{textTransform:'none',fontSize:'11px',color:'rgba(44,26,14,.3)',letterSpacing:'0'}}>(opcional)</span></label>
            <input className="t-input" type="email" placeholder="tucorreo@email.com" value={contacto.email} onChange={e=>onChange({...contacto,email:e.target.value})}/>
          </div>

          <div style={{marginBottom:'28px'}}>
            <label style={{display:'block',fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.15em',textTransform:'uppercase',color:'rgba(44,26,14,.5)',marginBottom:'8px'}}>Descripción / referencias <span style={{textTransform:'none',fontSize:'11px',color:'rgba(44,26,14,.3)',letterSpacing:'0'}}>(opcional)</span></label>
            <textarea className="t-input" rows="4" placeholder="Contanos más sobre el proyecto, dónde va el mueble, si tenés imágenes de inspiración..." value={contacto.desc} onChange={e=>onChange({...contacto,desc:e.target.value})}/>
          </div>

          {/* Summary */}
          <div style={{background:'var(--cream)',border:'1px solid rgba(191,177,141,.3)',padding:'20px',marginBottom:'28px'}}>
            <p style={{fontFamily:'Inter,sans-serif',fontSize:'10px',letterSpacing:'.2em',textTransform:'uppercase',color:'rgba(44,26,14,.4)',marginBottom:'14px'}}>Resumen del proyecto</p>
            {[
              ['Mueble',     [...selectedMuebles].map(id=>MUEBLES.find(m=>m.id===id)?.label||id).join(', ')],
              ['Cantidad',   `${qty} unidad${qty>1?'es':''}`],
              ['Material',   MATERIALES.find(m=>m.id===material)?.label||'—'],
              ['Herrajes',   HERRAJES.find(h=>h.id===herrajes)?.label||'—'],

                <span style={{color:'var(--dark)',fontWeight:'500'}}>{v}</span>

            <button onClick={onBack} style={{fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.15em',textTransform:'uppercase',color:'rgba(44,26,14,.4)',background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:'6px',padding:'14px 0'}}
              onMouseEnter={e=>e.currentTarget.style.color='var(--dark)'}
              onMouseLeave={e=>e.currentTarget.style.color='rgba(44,26,14,.4)'}>
              <Icon name="ChevronLeft" size={16} strokeWidth={2}/> Atrás

              onMouseEnter={e=>{if(ready)e.currentTarget.style.background='#15803d'}}

              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">

    }

    /* ════════════════════════════════════════════════════════
       APP ROOT
    ════════════════════════════════════════════════════════ */
    function App() {
      const [step, setStep]               = useState(1);
      const [selectedMuebles, setSel]     = useState(new Set());
      const [previewId, setPreviewId]     = useState(null);
      const [animKey, setAnimKey]         = useState(0);
      const [qty, setQty]                 = useState(1);
      const [medidas, setMedidas]         = useState({});
      const [material, setMaterial]       = useState(null);
      const [herrajes, setHerrajes]       = useState(null);
      const [terminacion, setTerminacion] = useState(null);
      const [contacto, setContacto]       = useState({ nombre:'', wsp:'', email:'', desc:'' });

      function goTo(s) {
        setStep(s);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function toggleMueble(id) {
        setSel(prev => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
        setPreviewId(id);
        setAnimKey(k => k + 1);
      }

      function hoverMueble(id) {
        if (previewId === id) return;
        setPreviewId(id);
        setAnimKey(k => k + 1);
      }

      // Hide loading screen
      useEffect(() => {
        const el = document.getElementById('loading');
        if (el) { el.classList.add('out'); setTimeout(()=>el.remove(), 500); }
      }, []);

      return (
        <div style={{minHeight:'100vh', background:'var(--light)'}}>
          <Navbar />

          {/* Page header */}
          <div style={{paddingTop:'110px', paddingBottom:'36px', background:'var(--cream)', borderBottom:'1px solid rgba(191,177,141,.2)'}}>
            <div style={{maxWidth:'960px',margin:'0 auto',padding:'0 24px',textAlign:'center'}}>
              <p style={{fontFamily:'Inter,sans-serif',fontSize:'11px',letterSpacing:'.5em',textTransform:'uppercase',color:'var(--gold)',marginBottom:'10px'}}>Carpintería de autor</p>
              <h1 style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(2rem,5vw,3rem)',color:'var(--dark)',margin:'0 0 10px'}}>Cotizá tu proyecto</h1>
              <p style={{fontFamily:'Inter,sans-serif',fontSize:'15px',color:'rgba(44,26,14,.55)',maxWidth:'480px',margin:'0 auto',lineHeight:'1.7'}}>
                Contanos qué tenés en mente. En 4 pasos armamos un presupuesto a medida.
              </p>
            </div>
          </div>

          <ProgressBar step={step} />

          {/* Main content */}
          <div style={{maxWidth:'1100px',margin:'0 auto',padding:'48px 24px 80px'}}>
            <div style={{display:'flex',gap:'48px',alignItems:'flex-start'}}>

              {/* Form column */}
              <div style={{flex:'1',minWidth:0}}>
                {step === 1 && <StepMueble selected={selectedMuebles} onToggle={toggleMueble} onHover={hoverMueble} onNext={()=>goTo(2)}/>}
                {step === 2 && <StepMedidas qty={qty} onQtyChange={setQty} medidas={medidas} onMedidas={setMedidas} onNext={()=>goTo(3)} onBack={()=>goTo(1)}/>}
                {step === 3 && <StepTerminacion material={material} herrajes={herrajes} terminacion={terminacion} onMaterial={setMaterial} onHerrajes={setHerrajes} onTerminacion={(c)=>{setTerminacion(c);setAnimKey(k=>k+1);}} onNext={()=>goTo(4)} onBack={()=>goTo(2)}/>}
                {step === 4 && <StepContacto contacto={contacto} onChange={setContacto} selectedMuebles={selectedMuebles} qty={qty} material={material} herrajes={herrajes} terminacion={terminacion} onBack={()=>goTo(3)}/>}
              </div>

              {/* Sketch preview column (desktop only) */}
              <div style={{width:'320px',flexShrink:0,position:'sticky',top:'140px',display:'none'}} id="sketch-col">
                <SketchPreview furniture={previewId || [...selectedMuebles][0]} animKey={animKey} step={step} terminacion={terminacion}/>
                {/* Floating decorative labels */}
                <div style={{marginTop:'16px',display:'flex',gap:'8px',flexWrap:'wrap'}}>
                  {[['Playfair Display','Madera seleccionada'],['Inter','Herrajes de calidad'],['Inter','Medidas exactas']].map(([font,text],i)=>(
                    <span key={i} style={{fontFamily:`${font},sans-serif`,fontSize:'10px',color:'rgba(44,26,14,.35)',letterSpacing:'.1em',padding:'4px 10px',border:'1px solid rgba(191,177,141,.2)',animation:`fadeIn .5s ease ${.3+i*.15}s both`}}>
                      {text}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Footer */}
          <footer style={{borderTop:'1px solid rgba(191,177,141,.2)',padding:'32px 24px',display:'flex',flexDirection:'column',alignItems:'center',gap:'12px',background:'var(--light)'}}>
            <a href="/"><img src="/media/logo-teca.webp" alt="TECA Muebles" style={{height:'38px',opacity:.6}}/></a>
            <p style={{fontFamily:'Inter,sans-serif',fontSize:'11px',color:'rgba(44,26,14,.3)',letterSpacing:'.15em'}}>La Plata · Gonnet — Carpintería de autor</p>
          </footer>
        </div>
      );
    }

    // Show sketch column on lg screens
    function handleResize() {
      const col = document.getElementById('sketch-col');
      if (col) col.style.display = window.innerWidth >= 1024 ? 'block' : 'none';
    }
    window.addEventListener('resize', handleResize);

    ReactDOM.createRoot(document.getElementById('cotiza-app')).render(<App />);

    // Run after mount
    setTimeout(handleResize, 100);
  </script>
</body>
</html>
